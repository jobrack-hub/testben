# Replace PLACEHOLDER with your app name after running: fly apps create
app = "bold-bush-3730"
primary_region = "lhr"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  DB_PATH = "/data/db.sqlite"

[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
